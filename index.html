<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>VLOB - Smooth Agar.io Clone</title>
</head>

<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <!-- ... -->
      <div id="editorToolbar" class="editor-toolbar" style="display: none;">
        <div class="toolbar-section">
          <span>Objects:</span>
          <button class="tool-btn active" data-shape="RECT">Rect</button>
          <button class="tool-btn" data-shape="CIRCLE">Circle</button>
          <button class="tool-btn" data-shape="TRIANGLE">Triangle</button>
          <button class="tool-btn" data-shape="LINE">Line</button>
        </div>
        <div class="toolbar-section">
          <span>Map Size:</span>
          <input type="number" id="mapSizeInput" value="5000" step="500" style="width: 70px;">
        </div>
        <div class="toolbar-section">
          <button id="clearMapBtn" class="tool-btn danger">Clear</button>
          <button id="saveMapBtn" class="tool-btn success">Save & Exit</button>
        </div>
      </div>


      <div class="score-display">
        Mass: <span id="scoreValue">0</span>
      </div>

      <!-- Mobile Controls -->
      <div id="joystickContainer" class="joystick-container">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>

      <div id="actionButtons" class="action-buttons">
        <div id="throwBtn" class="btn-circle btn-throw">THROW</div>
        <div id="splitBtn" class="btn-circle btn-split">SPLIT</div>
      </div>
    </div>

    <div id="menu">
      <div class="menu-card">
        <h1>VLOB</h1>
        <div id="authSection">
          <button class="solana-btn" id="loginBtn">Connect Solana Wallet</button>
          <p class="auth-hint">Or play as guest below</p>
        </div>
        <div id="profileSection" style="display: none;">
          <div class="profile-stats">
            <span id="displayLevel">Lvl 1</span>
            <span id="displayWins">Wins: 0</span>
          </div>
        </div>
        <input type="text" id="playerName" placeholder="Guest" maxlength="15" value="" />

        <div class="control-settings">
          <h4>Choose controls</h4>
          <div class="control-options">
            <div class="control-option active" id="controlFollow">
              <div class="icon-placeholder">👆</div>
              <span>Follow</span>
            </div>
            <div class="control-option" id="controlJoystick">
              <div class="icon-placeholder">🕹️</div>
              <span>Joystick</span>
            </div>
          </div>

          <h4>Buttons position</h4>
          <div class="position-settings">
            <label class="position-option">
              <input type="radio" name="btnPos" value="left" id="posLeft"> Left
            </label>
            <label class="position-option">
              <input type="radio" name="btnPos" value="right" id="posRight" checked> Right
            </label>
          </div>
          <h4>Skin</h4>
          <div class="skin-options">
            <div class="skin-option active" data-skin="default" style="background: #3b82f6;"></div>
            <div class="skin-option" data-skin="neon"
              style="background: linear-gradient(45deg, #3b82f6, #60a5fa); box-shadow: 0 0 10px #3b82f6;"></div>
            <div class="skin-option" data-skin="alien" style="background: radial-gradient(circle, #4ade80, #166534);">
            </div>
            <div class="skin-option" data-skin="core" style="background: #1e293b; border: 2px solid #3b82f6;"></div>
            <div class="skin-option" data-skin="ghost" style="background: rgba(59, 130, 246, 0.5);"></div>
          </div>
        </div>

        <button class="play-btn" id="playBtn" style="margin-bottom: 10px;">Play</button>
        <button class="solana-btn" id="createMapBtn" style="display: none; background: #8b5cf6; color: white;">Create
          Map (Dev Only)</button>
        <div class="controls-hint">
          Desktop: Mouse to move, Space to Split, E to Eject<br>
          Mobile: Touch to move
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
