<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>VLOB - Smooth Agar.io Clone</title>
</head>

<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div class="leaderboard" id="leaderboard">
        <h3>Leaderboard</h3>
        <div id="leaderboardList"></div>
      </div>

      <div class="score-display">
        Mass: <span id="scoreValue">0</span>
      </div>

      <!-- Mobile Controls -->
      <div id="joystickContainer" class="joystick-container">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>

      <div id="actionButtons" class="action-buttons">
        <div id="throwBtn" class="btn-circle btn-throw">THROW</div>
        <div id="splitBtn" class="btn-circle btn-split">SPLIT</div>
      </div>
    </div>

    <div id="menu">
      <div class="menu-card">
        <h1>VLOB</h1>
        <div id="authSection">
          <button class="solana-btn" id="loginBtn">Connect Solana Wallet</button>
          <p class="auth-hint">Or play as guest below</p>
        </div>
        <div id="profileSection" style="display: none;">
          <div class="profile-stats">
            <span id="displayLevel">Lvl 1</span>
            <span id="displayWins">Wins: 0</span>
          </div>
        </div>
        <input type="text" id="playerName" placeholder="Guest" maxlength="15" value="" />

        <div class="control-settings">
          <h4>Choose controls</h4>
          <div class="control-options">
            <div class="control-option active" id="controlFollow">
              <div class="icon-placeholder">👆</div>
              <span>Follow</span>
            </div>
            <div class="control-option" id="controlJoystick">
              <div class="icon-placeholder">🕹️</div>
              <span>Joystick</span>
            </div>
          </div>

          <h4>Buttons position</h4>
          <div class="position-settings">
            <label class="position-option">
              <input type="radio" name="btnPos" value="left" id="posLeft"> Left
            </label>
            <label class="position-option">
              <input type="radio" name="btnPos" value="right" id="posRight" checked> Right
            </label>
          </div>
        </div>

        <button class="play-btn" id="playBtn">Play</button>
        <div class="controls-hint">
          Desktop: Mouse to move, Space to Split, W to Eject<br>
          Mobile: Touch to move
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
