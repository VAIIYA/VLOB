<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>VLOB - Smooth Agar.io Clone</title>
  <!-- Google Adsense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8049952818757963"
    crossorigin="anonymous"></script>
</head>

<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <!-- ... -->
      <div id="editorToolbar" class="editor-toolbar" style="display: none;">
        <div class="toolbar-section">
          <span>Objects:</span>
          <button class="tool-btn active" data-shape="RECT">Rect</button>
          <button class="tool-btn" data-shape="CIRCLE">Circle</button>
          <button class="tool-btn" data-shape="TRIANGLE">Triangle</button>
          <button class="tool-btn" data-shape="LINE">Line</button>
        </div>
        <div class="toolbar-section">
          <span>Map Size:</span>
          <input type="number" id="mapSizeInput" value="5000" step="500" style="width: 70px;">
        </div>
        <div class="toolbar-section">
          <button id="clearMapBtn" class="tool-btn danger">Clear</button>
          <button id="saveMapBtn" class="tool-btn success">Save & Exit</button>
        </div>
      </div>

      <div class="score-display">
        Mass: <span id="scoreValue">0</span>
      </div>

      <!-- Mobile Controls -->
      <div id="joystickContainer" class="joystick-container">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>

      <div id="actionButtons" class="action-buttons">
        <div id="throwBtn" class="btn-circle btn-throw">THROW</div>
        <div id="splitBtn" class="btn-circle btn-split">SPLIT</div>
      </div>
    </div>

    <div id="menu">
      <!-- Mobile Sidebar Toggle -->
      <button id="sidebarToggle" class="sidebar-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Global Leaderboards (Desktop Sidebar) -->
      <div id="globalLeaderboards" class="global-leaderboards">
        <div class="lb-section">
          <h3>🏆 Top Mass</h3>
          <div id="massLeaderboard" class="lb-list">Loading...</div>
        </div>
        <div class="lb-section">
          <h3>⚔️ Top Kills</h3>
          <div id="killLeaderboard" class="lb-list">Loading...</div>
        </div>
      </div>

      <div class="menu-card">
        <h1>VLOB</h1>
        <div id="authSection">
          <button class="solana-btn" id="loginBtn">Connect Solana Wallet</button>
          <p class="auth-hint">Or play as guest below</p>
        </div>
        <div id="profileSection" style="display: none;">
          <div class="profile-stats">
            <span id="displayLevel">Lvl 1</span>
            <span id="displayWins">Wins: 0</span>
          </div>
        </div>
        <input type="text" id="playerName" placeholder="Guest" maxlength="15" value="" />

        <div class="position-settings">
          <label class="position-option">
            <input type="radio" name="btnPos" value="left" id="posLeft"> Left
          </label>
          <label class="position-option">
            <input type="radio" name="btnPos" value="right" id="posRight" checked> Right
          </label>
        </div>

        <h4>Game Mode</h4>
        <div class="mode-settings">
          <div class="mode-option active" id="modeFFA" data-mode="ffa">FFA</div>
          <div class="mode-option" id="modeTeam" data-mode="team">Team</div>
        </div>
        <h4>Skin</h4>
        <div class="skin-options">
          <div class="skin-option active" data-skin="default" style="background: #3b82f6;"></div>
          <div class="skin-option" data-skin="neon" style="background: linear-gradient(45deg, #3b82f6, #60a5fa);">
          </div>
          <div class="skin-option" data-skin="doge"
            style="background-image: url('/skins/doge.png'); background-size: cover;"></div>
          <div class="skin-option" data-skin="bunny"
            style="background-image: url('/skins/bunny.png'); background-size: cover;"></div>
          <div class="skin-option" data-skin="alien_face"
            style="background-image: url('/skins/alien_face.png'); background-size: cover;"></div>
        </div>
      </div>

      <button class="play-btn" id="playBtn" style="margin-bottom: 10px;">Play</button>
      <button class="solana-btn" id="createMapBtn" style="display: none; background: #8b5cf6; color: white;">Create
        Map (Dev Only)</button>
      <div class="controls-hint">
        Desktop: Mouse to move, Space to Split, E to Eject<br>
        Mobile: Touch to move
      </div>

      <!-- Google Adsense Banner -->
      <div class="ad-banner-container">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8049952818757963"
          data-ad-slot="8049952818" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </div>
  </div>

  <!-- Death Popup -->
  <div id="deathPopup" class="death-popup" style="display: none;">
    <div class="popup-card">
      <h2>DEFEATED</h2>
      <div class="death-stats">
        <p>Final Mass: <span id="deathMass">0</span></p>
        <p>Time Alive: <span id="deathTime">0s</span></p>
      </div>
      <div class="popup-actions">
        <button id="respawnBtn" class="play-btn">RESTART</button>
        <button id="observeBtn" class="solana-btn" style="background: #2563eb;">OBSERVE</button>
        <button id="quitBtn" class="solana-btn danger">QUIT</button>
      </div>
    </div>
  </div>
  </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
